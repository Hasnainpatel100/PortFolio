name: proftolio
description: "A magical wizard-themed portfolio for Hasnain Patel - Flutter Developer"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  animated_text_kit: ^4.2.2
  cloud_firestore: ^5.5.0
  code_formatter_package: ^1.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  emailjs: ^4.0.0
  equatable: ^2.0.5
  firebase_core: ^3.8.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_bloc: ^8.1.6
  flutter_screenutil: ^5.9.3
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^10.7.0
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  responsive_framework: ^1.5.1
  shared_preferences: ^2.3.3
  simple_animations: ^5.0.2
  universal_html: ^2.2.4
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    # - assets/icons/
  # Note: Using Google Fonts package instead of local fonts
  # No need to manually add font files - they're downloaded automatically!
